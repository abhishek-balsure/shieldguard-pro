name: ShieldGuard Pro CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        run: |
          python -c "import flask; import sklearn; import numpy; import pandas; print('✅ All imports OK')"

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build -t abhiishek25/shieldguard-pro:latest .
          docker push abhiishek25/shieldguard-pro:latest
          echo "✅ Image pushed to Docker Hub!"

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull abhiishek25/shieldguard-pro:latest
            docker stop shieldguard-pro || true
            docker rm shieldguard-pro || true
            docker run -d \
              --name shieldguard-pro \
              -p 5000:5000 \
              -e FLASK_ENV=production \
              -e SECRET_KEY=shieldguard-secret-2026 \
              --restart unless-stopped \
              abhiishek25/shieldguard-pro:latest
            echo "✅ Deployed successfully on EC2!"