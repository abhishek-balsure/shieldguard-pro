name: ShieldGuard Pro CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        run: |
          python -c "import flask; import sklearn; import numpy; import pandas; print('✅ All imports OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t shieldguard-pro:latest .
          echo "✅ Docker build successful!"

      - name: Test Docker container starts
        run: |
          docker run -d -p 5000:5000 \
            --name test-container \
            -e SECRET_KEY=test-secret \
            shieldguard-pro:latest
          sleep 15
          docker ps | grep test-container
          echo "✅ Container running successfully!"
          docker stop test-container